# Docker Compose for local NRT MDM development
# Usage: docker compose up -d

name: mdm-nrt

services:
  # --------------------------------------------------------------------------
  # Infrastructure
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mdm
      POSTGRES_PASSWORD: mdm
      POSTGRES_DB: mdm
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    ports:
      - "5432:5432"
    volumes:
      - ./schema:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdm"]
      interval: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # MDM Engine (Consumer)
  # --------------------------------------------------------------------------
  mdm-engine:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: nrt-mdm-consumer
      POSTGRES_DSN: postgresql://mdm:mdm@postgres:5432/mdm
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import nrt_mdm; print(\"ok\")' || exit 0"]
      interval: 30s
      retries: 3
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Test Producer (for generating test events)
  # --------------------------------------------------------------------------
  test-producer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: ["python", "-m", "nrt_mdm.test_producer", "--mode", "seed", "--records", "100"]
    profiles:
      - test

  # --------------------------------------------------------------------------
  # Kafka UI (topic inspection)
  # --------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mdm-nrt
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # --------------------------------------------------------------------------
  # Streamlit Golden Record Viewer
  # --------------------------------------------------------------------------
  streamlit:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      POSTGRES_DSN: postgresql://mdm:mdm@postgres:5432/mdm
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.headless=true", "--server.address=0.0.0.0"]

volumes:
  pgdata:
