name: Update Local Repository and Run Sonar Scanner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    uses: zbrainiac-labs/DataOpsBackbone/.github/workflows/dataops-pipeline.yml@main
    with:
      SOURCE_DATABASE: MDM_DEV
      SOURCE_SCHEMA: MDM_DCM
      DCM_PROJECT_IDENTIFIER: MDM_DEV.MDM_DCM.MDM_PROJECT
      DCM_TARGET: DEV
    secrets: inherit
